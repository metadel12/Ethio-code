apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ethiocode-ingress
spec:
  rules:
    - host: ethiocode.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ethiocode-frontend
                port:
                  number: 80
